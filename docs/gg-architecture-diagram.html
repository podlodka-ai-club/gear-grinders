  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #f5f5f5;
      --ink: #2d3142;
      --muted: #4f5d75;
      --soft: #7a8399;
      --accent: #eb6c36;
      --link: #2e5aa8;
      --rule: rgba(45,49,66,0.12);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }

    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      padding: 44px 32px;
    }

    .frame {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .eyebrow {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    h1 {
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(28px, 3vw, 40px);
      font-weight: 400;
      line-height: 1.05;
      margin-bottom: 10px;
    }

    .dek {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 24px;
      max-width: 760px;
    }

    .canvas {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    svg {
      display: block;
      min-width: 1080px;
      width: 100%;
      height: auto;
    }
  </style>

    <p class="eyebrow">Architecture · Diagram Design</p>
    <h1>How gg turns backlog work into a verified PR</h1>
    <p class="dek">A durable local orchestrator claims a tracker task, builds execution context, fans out agent candidates in isolated worktrees, verifies/evaluates the results, then publishes or resumes from persisted state.</p>
