name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --extra dev --extra sandbox

      - name: Compile source tree
        run: uv run python -m compileall -q src/gg tests

      - name: Run test suite
        run: uv run --extra dev pytest -q

      - name: Smoke CLI help
        run: |
          uv run gg init --help
          uv run gg constitution --help
          uv run gg doctor --help
